<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş - Tarihten Liderlik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ottoman: {
                            red: '#8B0000',
                            gold: '#D4A574',
                            green: '#1B4332',
                            cream: '#FFF8E7',
                            dark: '#1a1a2e',
                            navy: '#16213e',
                        }
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-ottoman-dark font-sans min-h-screen flex items-center justify-center">
    <div class="absolute inset-0 overflow-hidden opacity-10">
        <div class="absolute top-0 right-0 w-96 h-96 border border-ottoman-gold rounded-full -mr-48 -mt-48"></div>
        <div class="absolute bottom-0 left-0 w-64 h-64 border border-ottoman-gold rounded-full -ml-32 -mb-32"></div>
        <div class="absolute top-1/2 left-1/2 w-80 h-80 border border-ottoman-gold rounded-full -ml-40 -mt-40"></div>
    </div>

    <div class="relative w-full max-w-md mx-4">
        <div class="text-center mb-8">
            <div class="text-5xl mb-4">&#127984;</div>
            <h1 class="font-serif text-3xl font-bold text-white mb-1">
                <span class="text-ottoman-gold">Tarihten</span> Liderlik
            </h1>
            <p class="text-gray-400 text-sm">MB Akademi</p>
        </div>

        <div class="bg-white/5 backdrop-blur-sm rounded-3xl p-8 border border-white/10 shadow-2xl">
            <h2 class="font-serif text-xl font-bold text-white mb-6 text-center">Giriş Yap</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="mb-4 px-4 py-3 rounded-xl text-sm font-medium
                {% if category == 'error' %}bg-red-500/20 text-red-300 border border-red-500/30
                {% else %}bg-blue-500/20 text-blue-300 border border-blue-500/30{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">Email</label>
                    <input type="email" name="email" required autofocus
                        class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-ottoman-gold focus:bg-white/15 transition"
                        placeholder="email@ornek.com">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">Şifre</label>
                    <input type="password" name="password" required
                        class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-ottoman-gold focus:bg-white/15 transition"
                        placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;">
                </div>
                <button type="submit"
                    class="w-full bg-ottoman-red hover:bg-ottoman-red/90 text-white py-3.5 rounded-xl font-bold text-lg transition shadow-lg shadow-ottoman-red/30">
                    Giriş Yap
                </button>
            </form>
        </div>

        <p class="text-center text-gray-400 text-sm mt-6">
            Hesabınız yok mu?
            <a href="{{ url_for('register') }}" class="text-ottoman-gold hover:text-ottoman-gold/80 font-semibold transition">Üye Ol</a>
        </p>
        <p class="text-center text-gray-500 text-xs mt-3">MB Akademi</p>
    </div>
</body>
</html>
